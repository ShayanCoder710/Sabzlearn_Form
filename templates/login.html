<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../static/images/icon.png">
    <title>ورود با شماره موبایل - سبزلرن</title>
    <style>

        @font-face {
            font-family: IRANYekanX-ExtraBold;
            src: url(../static/font/IRANYekanX-ExtraBold.woff);
        }
        *{
            text-align: center;
            font-family: IRANYekanX-ExtraBold;
        }
        body{
            background-color: rgb(238, 238, 238);
            margin: 0;
            padding: 0;
        }
        a{
            text-decoration: none;
        }
        pre{
            font-size: 20px;
        }  
        p{
            font-size: 20px;
        }
        fieldset{
            background-color: white;
            border: 4px solid rgb(255, 255, 255);
            border-radius: 7px;
            margin: 0 auto;
            width: 310px;
            height: auto;
        }
        input{
            background-color: rgb(238, 238, 238);
            font-size: 20px;
            border: 0px solid rgb(255, 255, 255);
            border-radius: 7px;
            width: 85%;
            height: 47px;
        }
        input::placeholder{
            font-size: 17px;
        }
        #image{
            margin: 0 auto;
            margin-bottom: 0px;
            width: 200px;
            height: auto;
        }


    </style>
</head>
<body>


    <img src="../static/images/logo.png" alt="sabzlearn logo" id="image">


    <form action="{{ url_for('submit2') }}" method="post">



        <fieldset>


            <h2>ورود با شماره موبایل</h2>


            <p>حساب کاربری ندارید؟<a href="{{ url_for('singup') }}" style="color: rgb(0, 144, 0);">ثبت نام کنید</a></p>


            <input type="number" name="numphone" placeholder="شماره موبایل" maxlength="11" min="09000000000" max="09999999999" required> <br> <br>


            <input type="submit" value="ادامه" style="background-color: rgb(0, 163, 0);color: white;">

            
        </fieldset>


    </form>



            <p>با عضویت در سایت، تمامی قوانین و شرایط استفاده از خدمات <b><a href="{{ url_for('index') }}" style="color: rgb(0, 144, 0);">سبزلرن</a></b> را پذیرفته اید.    </p>



</body>
</html>
