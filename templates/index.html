<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../static/images/icon.png">
    <title>آکادمی آموزش برنامه نویسی سبزلرن</title>
    <style>

        @font-face {
            font-family: IRANYekanX-ExtraBold;
            src: url(../static/font/IRANYekanX-ExtraBold.woff);
        }
        *{
            text-align: center;
            font-family: IRANYekanX-ExtraBold;
        }
        body{
            background-color: #ffffff;
        }
        a{
            text-decoration: none;
        }
        #image{
            width: 200px;
            height: auto;
            border: 3px solid rgb(15, 183, 0);
            border-radius: 4%;
            transition: border-radius 0.3s ease;
        }
        #image:hover{
            border: 3px solid #10902e;
            border-radius: 50%;
        }
        #btn{
            background-color: rgb(37, 169, 0);
            border: 2px solid rgb(0, 186, 0);
            border-radius: 6px;
            width: 200px;
            height: 50px;
            transition: background-color 0.4s ease-in-out; 
        }
        #btn:hover{
            background-color: #007a10;
        }



    </style>
</head>
<body>


    <br> <br> <br> <br> <br>


    <button id="btn">
        <a href="{{ url_for('login') }}" style="color: white;font-size: 23px;">
            ورود | عضویت
        </a>
    </button>


    <br> <br>


    <img src="../static/images/icon.png" alt="sabzlearn logo" id="image">

 
</body>
</html>
